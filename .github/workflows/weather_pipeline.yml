name: Weather ETL Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  
  workflow_dispatch:          

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # needed so git can push back later

      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      
      - name: Run pipeline
        run: |
          cd src
          python3 main.py

     
      - name: Commit updated weather log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data/weather_log.txt
          git diff --staged --quiet || git commit -m "chore: update weather log [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push